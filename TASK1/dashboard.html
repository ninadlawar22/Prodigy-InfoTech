<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · AuthSys</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <div class="dashboard-nav">
    <div class="nav-logo">
      Auth<span>Sys</span>
    </div>

    <div class="nav-actions">
      <button class="btn-sm danger" id="logoutBtn">
        Logout
      </button>
    </div>
  </div>

  <div class="user-profile">
    <div class="avatar" id="avatar">
      U
    </div>

    <div class="profile-info">
      <h2 id="userName">User Name</h2>
      <p id="userEmail">user@email.com</p>
    </div>
  </div>

  <div class="dash-grid">
    <div class="dash-card">
      <div class="dash-card-label">User Role</div>
      <div class="dash-card-value" id="userRole">User</div>
    </div>

    <div class="dash-card">
      <div class="dash-card-label">Login Status</div>
      <div class="dash-card-value">Authenticated ✅</div>
    </div>
  </div>

</div>

<script src="api.js"></script>

<script>
  // Protect page
  if (!Auth.isLoggedIn()) {
    location.href = "index.html";
  }

  const user = Auth.getUser();

  if (user) {
    document.getElementById("userName").textContent = user.name;
    document.getElementById("userEmail").textContent = user.email;
    document.getElementById("userRole").textContent = user.role;
    document.getElementById("avatar").textContent =
      user.name.charAt(0).toUpperCase();
  }

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    Auth.clear();
    location.href = "index.html";
  });
</script>

</body>
</html>
