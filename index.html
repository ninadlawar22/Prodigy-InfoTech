<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · AuthSys</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <a class="logo" href="index.html">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Auth<span>Sys</span></div>
  </a>

  <div class="card">
    <div class="card-header">
      <h1>Welcome Back</h1>
      <p>Don't have an account? <a href="register.html">Create one →</a></p>
    </div>

    <div id="alertBox"></div>

    <form id="loginForm">
      <!-- Email -->
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="Enter email" required>
          <span class="icon">✉</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter password" required>
          <span class="icon">🔒</span>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        Sign In
      </button>
    </form>
  </div>
</div>

<script src="api.js"></script>

<script>
  if (Auth.isLoggedIn()) {
    location.href = "dashboard.html";
  }

  const form = document.getElementById("loginForm");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlert("alertBox");

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      return showAlert("alertBox", "error", "All fields are required.");
    }

    setLoading(submitBtn, true, "Sign In");

    const { ok, data } = await apiFetch("/auth/login", {
      method: "POST",
      body: JSON.stringify({ email, password })
    });

    setLoading(submitBtn, false, "Sign In");

    if (ok && data.success) {
      Auth.setToken(data.token);
      Auth.setUser(data.user);

      showAlert("alertBox", "success", "Login successful!");

      setTimeout(() => {
        location.href = "dashboard.html";
      }, 1000);
    } else {
      showAlert(
        "alertBox",
        "error",
        data.message || "Login failed"
      );
    }
  });
</script>

</body>
</html>
